

version: "3.8"
services:
  # ---------------------- DATABASE ----------------------
  dashboard_postgres:
    image: postgres:15
    container_name: dashboard_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aqua1992.
      POSTGRES_DB: ventas_mv
    volumes:
      - dashboard_pgdata:/var/lib/postgresql/data
    networks:
      - aqua-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------- BACKEND ----------------------
  dashboard_backend:
    build: ./backend
    container_name: dashboard_backend
    restart: always
    environment:
      DB_HOST: dashboard_postgres
      DB_USER: postgres
      DB_PASS: Aqua1992.
      DB_NAME: ventas_mv
      PORT: 5000
    depends_on:
      dashboard_postgres:
        condition: service_healthy
    networks:
      - aqua-network
    ports:
      - "5000:5000"
    volumes:
      # Logs del cron
      - ./backend/cron/cronLog:/app/cron/cronLog
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------- FRONTEND ----------------------
  dashboard_frontend:
    build: ./my-app
    container_name: dashboard_frontend
    restart: always
    networks:
      - aqua-network
    ports:
      - "3001:80"
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --spider -q http://localhost || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3

# ---------------------- NETWORKS ----------------------
networks:
  aqua-network:
    external: true

# ---------------------- VOLUMES -----------------------
volumes:
  dashboard_pgdata:
